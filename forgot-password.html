<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <!-- Favicon -->
  <link rel="icon" href="favicon.ico" type="image/x-icon">

</head>
<body>
  
  <main class="auth-main">
    <img src="kfgc.jpg" alt="KFGC Media App Logo" loading="lazy">
  <div>
    <h2>Reset Your Password</h2>
    <p> ....and teach them all I have taught you. </br> MATHEW 28:20 </p>
    </div>
    <div class="auth-card">
      <div class="auth-toggle">
        <button id="loginTab" class="active">input your email</button>
        </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" class="auth-form active">
        <input type="email" id="loginEmail" placeholder="Email Address" required>
      <button type="submit">Continue</button>
        <p id="loginMsg"></p>
      </form>

     <div class="link-button">
            <a href="auth.html">Aready Have an account? Login</a>
      </div>
    </div>

  </main>
  <style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #08203a, #1a2b4c);
  color: #fff;
}

.auth-main {
  width: 100%;
  max-width: 400px;
  padding: 1rem;
}
img {
  margin-left: 37%;
  width: 90px;
  height: 90px;
  border-radius: 40%;
}
h2 {
  text-align: center;
  font-weight: bold;
  color: chartreuse;
}
p {
  text-align: center;
  color: aqua;
}
a {
  color: pink;
}
.link-button {
  text-align: center;
}
/* Auth card */
.auth-card {
  background-color: rgba(8, 32, 58, 0.95);
  padding: 2rem;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
}

/* Tab toggle */
.auth-toggle {
  display: flex;
  justify-content: center;
  margin-bottom: 1.5rem;
}

.auth-toggle button {
  flex: 1;
  padding: 0.8rem 0;
  border: none;
  background: transparent;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: color 0.3s ease, border-bottom 0.3s ease;
  border-bottom: 2px solid transparent;
}

.auth-toggle button.active {
  color: #d9a441;
  border-bottom: 2px solid #d9a441;
}

/* Forms */
.auth-form {
  display: none;
  flex-direction: column;
  gap: 1rem;
  transition: opacity 0.4s ease, transform 0.4s ease;
}

.auth-form.active {
  display: flex;
}

.auth-form input {
  padding: 0.8rem 1rem;
  border-radius: 8px;
  border: none;
  outline: none;
  font-size: 1rem;
  background-color: #0e1624;
  color: #fff;
}

.auth-form input::placeholder {
  color: #ccc;
}

.auth-form input:focus {
  background-color: #08203a;
}

.auth-form button {
  padding: 0.9rem 1rem;
  border-radius: 8px;
  border: none;
  background-color: #d9a441;
  color: #08203a;
  font-weight: bold;
  font-size: 1rem;
  cursor: pointer;
  transition: background 0.3s ease, transform 0.2s ease;
}

.auth-form button:hover {
  background-color: #f0c961;
  transform: translateY(-2px);
}

.auth-form p {
  text-align: center;
  font-size: 0.9rem;
  color: #ff6961;
}

/* Responsive */
@media (max-width: 500px) {
  .auth-card {
    padding: 1.5rem;
  }
}

/* FLOATING WHATSAPP BUTTON */
.floating-chat {
    position: fixed;
    bottom: 5px;
    right: 20px;
    background: purple;
    padding: 15px 15px;
    border-radius: 40%;
    font-size: 15px;
    color: white;
    text-decoration: none;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}  
  </style>
  <script type="module">

// ---------------- LOGIN ----------------
const loginFormEl = document.getElementById("loginForm");
const loginMsg = document.getElementById("loginMsg");

loginFormEl.addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value.trim();

  try {
    await signInWithEmailAndPassword(auth, email, password);
    loginMsg.textContent = "Login successful! Redirecting...";
    setTimeout(() => window.location.replace("profile.html"), 1000);
  } catch (err) {
    console.error(err);
    if (err.code === "auth/user-not-found") {
      loginMsg.textContent = "No account found. Please sign up.";
    } else if (err.code === "auth/wrong-password") {
      loginMsg.textContent = "Incorrect password.";
    } else {
      loginMsg.textContent = "Login failed. " + err.message;
    }
  }
});

  } catch (err) {

    signupMsg.textContent = "Failed to create account. " + err.message;
  }

// ---------------- TOGGLE LOGIN / SIGN UP ----------------
const loginTab = document.getElementById("loginTab");
const signupTab = document.getElementById("signupTab");

loginTab.addEventListener("click", () => {
  loginTab.classList.add("active");
  signupTab.classList.remove("active");
  loginFormEl.classList.add("active");
  signupFormEl.classList.remove("active");

  loginMsg.textContent = "";  // Clear messages when switching
  signupMsg.textContent = "";
});

signupTab.addEventListener("click", () => {
  signupTab.classList.add("active");
  loginTab.classList.remove("active");
  signupFormEl.classList.add("active");
  loginFormEl.classList.remove("active");

  loginMsg.textContent = "";
  signupMsg.textContent = "";
});
  </script>
</body>
</html>

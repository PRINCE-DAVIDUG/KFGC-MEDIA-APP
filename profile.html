  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">

      <!-- Brand -->
      <a href="index.html" class="brand">
        <img src="kfgc.jpg" alt="KFGC Media App Logo" class="logo">
        <span class="brand-text">KFGC MEDIA APP</span>
      </a>

      <!-- Navigation -->
      <nav id="primary-nav" class="primary-nav">
        <ul>
          <li><a href="about-us.html"><i class="fa-solid fa-church"></i> About Us</a></li>

      <!-- Profile Header -->
      <div class="profile-header">
        <a href="profile.html">
          <img id="headerDp" src="user.jpg" alt="Profile" class="profile-img">
        </a>
        <span id="headerName">Member</span>
        <button id="logoutBtn" class="btn danger">Logout</button>
      </div>

    </div>
  </header>

  <!-- Main Profile -->
  <main class="profile-main">
    <div class="profile-card">
      <h2>My Profile</h2>

      <form id="profileForm">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" placeholder="Enter full name" required>

        <label for="dp">Profile Picture</label>
        <input type="file" id="dp" accept="image/*">

        <div class="dp-preview-container">
          <img id="dpPreview" src="user.jpg" alt="DP Preview" class="profile-img">
        </div>

        <progress id="uploadProgress" value="0" max="100" style="width:100%; display:none;"></progress>

        <button type="submit" class="btn">Update Profile</button>
      </form>

      <p id="msg"></p>
    </div>
  </main>

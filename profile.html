<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Profile — KFGC Media App</title>

  <style>
    :root {
      --navy:#08203a;
      --gold:#d9a441;
      --bg:#f4f6f9;
    }

    body {
      margin:0;
      background:var(--bg);
      font-family:system-ui,sans-serif;
    }

    header {
      background:var(--navy);
      color:#fff;
      padding:12px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    header img {
      width:40px;
      height:40px;
      border-radius:50%;
      object-fit:cover;
    }

    main {
      max-width:420px;
      margin:auto;
      padding:20px;
    }

    .card {
      background:#fff;
      border-radius:16px;
      padding:20px;
      box-shadow:0 10px 25px rgba(0,0,0,.1);
    }

    .avatar {
      text-align:center;
      margin-bottom:16px;
    }

    .avatar img {
      width:120px;
      height:120px;
      border-radius:50%;
      border:3px solid var(--gold);
      object-fit:cover;
    }

    label {
      font-weight:600;
      display:block;
      margin-bottom:6px;
    }

    input, button {
      width:100%;
      padding:10px;
      margin-bottom:14px;
      border-radius:10px;
      border:1px solid #ccc;
    }

    button {
      background:var(--gold);
      border:none;
      font-weight:700;
      cursor:pointer;
    }

    .logout {
      background:#e74c3c;
      color:#fff;
    }

    .msg {
      text-align:center;
      font-weight:600;
      margin-top:10px;
    }
  </style>
</head>

<body>

<header>
  <img id="headerDp" src="user.jpg">
  <span id="headerName">Member</span>
</header>

<main>
  <div class="card">
    <div class="avatar">
      <img id="dpPreview" src="user.jpg">
    </div>

    <form id="profileForm">
      <label>Full Name</label>
      <input id="fullName" required>

      <label>Profile Picture</label>
      <input id="dp" type="file" accept="image/*">

      <button>Save Profile</button>
    </form>

    <div class="msg" id="msg"></div>

    <button class="logout" id="logoutBtn">Logout</button>
  </div>
</main>

<script type="module" src="profile.js"></script>
</body>
</html>
